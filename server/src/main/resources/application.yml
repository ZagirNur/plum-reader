spring:
  application:
    name: plum-reader
  datasource:
    url: jdbc:postgresql://localhost:5432/plum_reader
    username: plum
    password: plum
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
