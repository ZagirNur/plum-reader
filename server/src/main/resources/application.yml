spring:
  application:
    name: plum-reader
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plum_reader}
    username: ${DB_USERNAME:plum}
    password: ${DB_PASSWORD:plum}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
