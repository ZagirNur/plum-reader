spring:
  application:
    name: plum-reader
  task:
    scheduling:
      # split worker + markup worker + stale-lock sweep run concurrently.
      # Default = 1 would serialize them, so a long markup blocks the sweep.
      pool:
        size: ${PLUM_SCHEDULING_POOL_SIZE:3}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plum_reader}
    username: ${DB_USERNAME:plum}
    password: ${DB_PASSWORD:plum}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${PLUM_UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${PLUM_UPLOAD_MAX_REQUEST_SIZE:50MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

plum:
  jwt:
    # dev-only default. Override via PLUM_JWT_SECRET in any non-local env.
    # Must be >= 32 bytes (HS256). Generate: openssl rand -base64 48
    secret: ${PLUM_JWT_SECRET:dev-only-do-not-use-in-production-replace-me-with-real-secret}
    expiration-minutes: ${PLUM_JWT_EXPIRATION_MINUTES:60}
  cors:
    # Explicit allow-list. Default = empty (same-origin only).
    # Set PLUM_CORS_ALLOWED_ORIGINS to a comma-separated list for production,
    # e.g. "https://app.plumreader.local,https://m.plumreader.local".
    # Use "*" only for dev/local (cannot be combined with credentials).
    allowed-origins: ${PLUM_CORS_ALLOWED_ORIGINS:}
  storage:
    root: ${PLUM_STORAGE_ROOT:./var/storage}
  worker:
    enabled: ${PLUM_WORKER_ENABLED:true}
    poll-interval: ${PLUM_WORKER_POLL_INTERVAL:2s}
    lock-timeout: ${PLUM_WORKER_LOCK_TIMEOUT:15m}
    stale-lock-sweep-interval: ${PLUM_WORKER_STALE_LOCK_SWEEP_INTERVAL:1m}
    max-attempts: ${PLUM_WORKER_MAX_ATTEMPTS:5}
    retry-backoff-base: ${PLUM_WORKER_RETRY_BACKOFF_BASE:10s}
    retry-backoff-max: ${PLUM_WORKER_RETRY_BACKOFF_MAX:1h}
  translate:
    provider: ${PLUM_TRANSLATE_PROVIDER:gemini}
    context-radius: ${PLUM_TRANSLATE_CONTEXT_RADIUS:250}
    default-target-language: ${PLUM_TRANSLATE_DEFAULT_LANG:ru}
    gemini:
      api-key: ${PLUM_GEMINI_API_KEY:}
      model: ${PLUM_GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${PLUM_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      timeout-seconds: ${PLUM_GEMINI_TIMEOUT_SECONDS:15}
